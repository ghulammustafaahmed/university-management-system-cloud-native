apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-proxy
  namespace: university
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-proxy
  template:
    metadata:
      labels:
        app: nginx-proxy
    spec:
      containers:
      - name: nginx
        image: nginx-proxy:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        # FIX: Shifted back to line up correctly with container properties
        readinessProbe:
          httpGet:
            path: /nginx-health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        # OPTIONAL: Added liveness probe to auto-restart pod if it locks up
        livenessProbe:
          httpGet:
            path: /nginx-health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 20
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-proxy
  namespace: university
spec:
  selector:
    app: nginx-proxy
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080