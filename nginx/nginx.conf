worker_processes auto;
events { worker_connections 1024; }

http {
    upstream frontend { server frontend:5000; }
    upstream auth     { server auth-service:5001; }
    upstream reg      { server registration-service:5002; }
    upstream lms      { server lms-service:5003; }
    upstream result   { server result-service:5004; }
    upstream attend   { server attendance-service:5005; }
    upstream profile  { server profile-service:5006; }

    # FIX: Increased rate limits to prevent dropping microservice traffic
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=web:10m rate=30r/s;

    server {
        listen 80;
        server_name _;
        client_max_body_size 10M;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # Main frontend app
        location / {
            limit_req zone=web burst=40 nodelay;
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # New block for file downloads
        location /assignments/download/ {
            proxy_pass http://lms;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # FIX: Increased burst capacity and added 'nodelay' to avoid 503 errors
        # API routes — direct to microservices
        location /api/auth/     { limit_req zone=api burst=30 nodelay; proxy_pass http://auth/;    proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/reg/      { limit_req zone=api burst=30 nodelay; proxy_pass http://reg/;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/lms/      { limit_req zone=api burst=30 nodelay; proxy_pass http://lms/;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/results/  { limit_req zone=api burst=30 nodelay; proxy_pass http://result/;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/attend/   { limit_req zone=api burst=30 nodelay; proxy_pass http://attend/;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/profile/  { limit_req zone=api burst=30 nodelay; proxy_pass http://profile/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }

        # Health check
        location /nginx-health { return 200 "NGINX OK\n"; add_header Content-Type text/plain; }
    }
}